name: Deploy Jekyll with Actions

on:
  push:
    branches: ["main"] # 오직 main 브랜치에 push될 때만 배포 실행

permissions: # Pages 배포를 위해 반드시 필요한 권한들
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. 빌드 작업 (우분투 컴퓨터 빌리기)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby # Jekyll은 Ruby 언어로 돌아갑니다
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # 최신 루비 버전 사용
          bundler-cache: true # 라이브러리 설치 속도 향상

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build # 여기서 사이트 결과물(HTML)이 생성됨
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 빌드된 HTML 파일들을 임시 보관

  # 2. 배포 작업 (빌드가 성공해야만 실행됨)
  deploy:
    needs: build # 빌드 작업이 완료될 때까지 기다림
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 아까 보관한 파일들을 웹사이트로 공개
